<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOVPH - Municipal Ordinances</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/transition.css">
  <link rel="stylesheet" href="../../css/animation.css">
  <link rel="stylesheet" href="../../css/news.css">
</head>
<body class="loading">
  <script>window.__ACTIVE_TAB = '';</script>
  <div id="app">
    <div id="header-placeholder"></div>

    <section class="page-hero">
      <div class="page-hero-inner">
        <h1 class="page-hero-title">MUNICIPAL ORDINANCES</h1>
        <p class="page-hero-subtitle">Browse all ordinances by category.</p>
      </div>
    </section>

    <div class="content-tabs">
      <a class="tab" :class="{ active: activeTab === 'news' }" href="news-and-updates.html">NEWS AND UPDATE</a>
      <a class="tab" :class="{ active: activeTab === 'events' }" href="events.html">EVENTS</a>
      <a class="tab" :class="{ active: activeTab === 'tourism' }" href="tourism.html">TOURISM</a>
      <a class="tab" :class="{ active: activeTab === 'gallery' }" href="gallery.html">GALLERY</a>
    </div>

    <div class="main-wrap">
      <main class="main-content">
        <section class="card section-ordinances">
          <h2 class="section-title">All Ordinances</h2>
          <div class="ordinance-cats">
            <button v-for="cat in ordinanceCats" :key="cat" class="ordinance-cat" :class="{ active: selectedOrdinanceCat === cat }" @click="selectedOrdinanceCat = cat">{{ cat }}</button>
          </div>
          <div class="ordinance-list">
            <div v-for="(item, i) in filteredOrdinanceItems" :key="i" class="ordinance-row">
              <span class="ordinance-title">{{ item.title }}</span>
              <span class="ordinance-date">{{ item.date }}</span>
            </div>
            <div v-if="!filteredOrdinanceItems.length" class="ordinance-empty">No ordinances in this category.</div>
          </div>
        </section>
      </main>

      <aside class="sidebar">
        <div id="sidebar-widgets-placeholder"></div>
      </aside>
    </div>

    <div id="footer-placeholder"></div>
  </div>

  <script src="../../js/header_footer.js"></script>
</body>
</html>
